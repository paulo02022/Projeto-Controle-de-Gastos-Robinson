<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso | Controle de Gastos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font: 'Sora', sans-serif;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59,130,246,0.18);
      --danger: #ef4444;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border: rgba(0,0,0,0.08);
      --input-bg: rgba(255,255,255,0.85);
      --card-bg: rgba(255,255,255,0.72);
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      background: #f0f4ff;
      background-image:
        radial-gradient(ellipse 70% 50% at 10% 0%, rgba(59,130,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(99,102,241,0.10) 0%, transparent 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* decorative shapes */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow:
        0 20px 60px rgba(59,130,246,0.08),
        0 4px 16px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.8);
      backdrop-filter: blur(24px);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* logo */
    .logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: white;
      box-shadow: 0 6px 20px rgba(59,130,246,0.3);
    }
    .logo-text {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .logo-text span { color: var(--accent); }

    /* heading */
    .heading { text-align: center; margin-bottom: 32px; }
    .heading h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
      color: var(--text-primary);
    }
    .heading p {
      margin-top: 8px; font-size: 14px;
      color: var(--text-secondary);
    }

    /* tab switcher */
    .tabs {
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.04);
      border-radius: 10px; padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      border: none; border-radius: 7px;
      font-family: var(--font);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      background: transparent;
      color: var(--text-secondary);
    }
    .tab-btn.active {
      background: white;
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* form panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* fields */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: var(--input-bg);
      font-family: var(--font);
      font-size: 14px; color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .field input::placeholder { color: #94a3b8; }

    /* error */
    .field-error {
      font-size: 12px; color: var(--danger);
      margin-top: 4px; display: none;
    }

    /* forgot link */
    .forgot {
      display: block; text-align: right;
      font-size: 12px; color: var(--text-secondary);
      text-decoration: none; margin-top: -8px; margin-bottom: 20px;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--accent); }

    /* submit button */
    .btn-submit {
      width: 100%; padding: 14px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: white; font-family: var(--font);
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(59,130,246,0.3);
      position: relative; overflow: hidden;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59,130,246,0.4);
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* feedback */
    .feedback {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px; font-weight: 500;
      text-align: center;
      display: none;
    }
    .feedback.error { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .feedback.success { background: rgba(34,197,94,0.08); color: #16a34a; border: 1px solid rgba(34,197,94,0.2); }
    .feedback.show { display: block; }

    /* back link */
    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 24px;
      font-size: 13px; color: var(--text-secondary);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* divider */
    .or-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0;
      font-size: 12px; color: var(--text-secondary);
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <div class="logo-icon">💰</div>
      <div class="logo-text">Gastos<span>Mensais</span></div>
    </div>

    <div class="heading">
      <h1>Bem-vindo de volta</h1>
      <p>Acesse sua conta para gerenciar suas finanças</p>
    </div>

    <!-- TAB SWITCHER -->
    <div class="tabs">
      <button class="tab-btn active" id="tabLoginBtn" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" id="tabRegisterBtn" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="panelLogin">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="glEmail" placeholder="seu@email.com" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="glPassword" placeholder="••••••••" required>
      </div>
      <a href="#" class="forgot">Esqueceu a senha?</a>
      <button class="btn-submit" id="btnLogin" onclick="handleLogin()">Entrar</button>
      <div class="feedback" id="loginFeedback"></div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel" id="panelRegister">
      <div class="field">
        <label>Nome de usuário</label>
        <input type="text" id="grUsername" placeholder="Seu nome" required>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="grEmail" placeholder="seu@email.com" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="grPassword" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="field">
        <label>Confirmar Senha</label>
        <input type="password" id="grPasswordConfirm" placeholder="Repita a senha" required>
      </div>
      <button class="btn-submit" id="btnRegister" onclick="handleRegister()" style="margin-top:4px;">Criar Conta</button>
      <div class="feedback" id="registerFeedback"></div>
    </div>

    <a href="dashboard.html" class="back-link">← Voltar ao Portfólio</a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Init Supabase (mesmo projeto) ──────────────────────────────
    const supabaseUrl = "https://dggxhpjevvixiwtflnar.supabase.co";
    const supabaseKey = "sb_publishable_1ZM1iv0lxkSCSlfkCsyG7w_xZfaQ1fM";
    const client = supabase.createClient(supabaseUrl, supabaseKey);
    window.supabaseClient = client; // expõe globalmente para gastos.js

    // ── Redireciona se já estiver logado ───────────────────────────
    (async () => {
      const { data: { session } } = await client.auth.getSession();
      if (session) window.location.href = 'gastos.html';
    })();

    // ── Tab switcher ───────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
      document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
      document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegisterBtn').classList.toggle('active', tab === 'register');
    }

    // ── Feedback helper ────────────────────────────────────────────
    function showFeedback(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `feedback ${type} show`;
    }

    // ── LOGIN ──────────────────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById('glEmail').value.trim();
      const password = document.getElementById('glPassword').value;
      if (!email || !password) return showFeedback('loginFeedback', 'Preencha todos os campos.', 'error');

      const btn = document.getElementById('btnLogin');
      btn.disabled = true; btn.textContent = 'Entrando...';

      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        showFeedback('loginFeedback', 'E-mail ou senha incorretos.', 'error');
        btn.disabled = false; btn.textContent = 'Entrar';
      } else {
        showFeedback('loginFeedback', 'Sucesso! Redirecionando...', 'success');
        setTimeout(() => window.location.href = 'gastos.html', 800);
      }
    }

    // ── REGISTER ───────────────────────────────────────────────────
    async function handleRegister() {
      const username = document.getElementById('grUsername').value.trim();
      const email    = document.getElementById('grEmail').value.trim();
      const password = document.getElementById('grPassword').value;
      const confirm  = document.getElementById('grPasswordConfirm').value;

      if (!username || !email || !password) return showFeedback('registerFeedback', 'Preencha todos os campos.', 'error');
      if (password.length < 6) return showFeedback('registerFeedback', 'Senha precisa ter pelo menos 6 caracteres.', 'error');
      if (password !== confirm) return showFeedback('registerFeedback', 'As senhas não coincidem.', 'error');

      const btn = document.getElementById('btnRegister');
      btn.disabled = true; btn.textContent = 'Criando conta...';

      const { error } = await client.auth.signUp({
        email, password,
        options: { data: { username } }
      });

      if (error) {
        showFeedback('registerFeedback', error.message, 'error');
        btn.disabled = false; btn.textContent = 'Criar Conta';
      } else {
        showFeedback('registerFeedback', 'Conta criada! Confirme seu e-mail para ativar.', 'success');
        btn.disabled = false; btn.textContent = 'Criar Conta';
      }
    }

    // ── Enter key ──────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const isLogin = document.getElementById('panelLogin').classList.contains('active');
      if (isLogin) handleLogin();
      else handleRegister();
    });
  </script>

</body>
</html>
